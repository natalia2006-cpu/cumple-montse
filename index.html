<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>¡Felicidades Montse! 🌸</title>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        /* Esto distribuye el texto arriba y el botón abajo */
        justify-content: space-between; 
        align-items: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Arial', sans-serif;
        touch-action: none;
        padding-top: 60px; /* Espacio para el texto */
        padding-bottom: 60px; /* Espacio para el botón */
        box-sizing: border-box;
    }
    canvas {
        display: block;
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
    }
    .mensaje {
        position: relative;
        z-index: 2;
        color: #968fff;
        font-size: 1.8rem; 
        text-align: center;
        width: 90%;
        font-weight: bold;
        text-shadow: 0 0 15px #843bc8;
        opacity: 0;
        animation: aparecer 3s ease-in forwards;
        pointer-events: none;
    }
    #btn-dedicatoria {
        position: relative; /* Cambiado a relativo para que respete el espacio */
        z-index: 3;
        padding: 12px 30px;
        background: rgba(13, 13, 13, 0.5); /* Fondo semitransparente por si toca pétalos */
        color: #968fff;
        border: 2px solid #968fff;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: bold;
        opacity: 0;
        animation: aparecer 2s ease-in forwards;
        animation-delay: 4s;
        cursor: pointer;
    }
    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 100;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: #151515;
        padding: 30px;
        border: 1px solid #968fff;
        border-radius: 25px;
        width: 80%;
        color: #f3e8ff;
        text-align: center;
    }
    @keyframes aparecer { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div class="mensaje">¡Muchas felicidades Montse!</div>
<canvas id="flower"></canvas>
<button id="btn-dedicatoria">Abrir</button>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h2 style="color: #968fff;">Para Montse 🌸</h2>
        <p>Tranquila, no me voy a poner muy cursie jajajaja.<br><br>Te quería agradecer por hacerme sentir agusto en la oficina. ¡Feliz cumpleaños!</p>
        <button onclick="document.getElementById('miModal').style.display='none'" style="background:none; border:none; color:#968fff; margin-top:20px; font-weight:bold; font-size: 1.1rem;">Cerrar</button>
    </div>
</div>

<script>
const canvas = document.getElementById('flower');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const particles = [];

function getFlowerPoint(t) {
    const k = 4;
    const pulse = Math.sin(Date.now() * 0.003) * 0.12;
    // Mantenemos el tamaño de la captura anterior que te gustó
    const baseSize = Math.min(window.innerWidth, window.innerHeight) * 0.35;
    const r = baseSize * Math.sin(k * t) * (1 + pulse);
    return { x: r * Math.cos(t), y: r * Math.sin(t) };
}

class Particle {
    constructor() {
        this.t = Math.random() * Math.PI * 2;
        this.x = window.innerWidth / 2;
        this.y = window.innerHeight / 2;
        this.size = Math.random() * 2 + 0.5;
        this.speed = Math.random() * 0.015 + 0.005;
        this.color = `hsl(${Math.random() * 40 + 260}, 85%, 75%)`;
    }
    update() {
        const target = getFlowerPoint(this.t);
        // 🔥 CENTRADO ABSOLUTO DE LA FLOR
        this.x += (window.innerWidth * 0.5 + target.x - this.x) * this.speed;
        this.y += (window.innerHeight * 0.5 + target.y - this.y) * this.speed;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

for (let i = 0; i < 700; i++) particles.push(new Particle());

function animate() {
    ctx.fillStyle = 'rgba(13, 13, 13, 0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

document.getElementById("btn-dedicatoria").onclick = () => {
    document.getElementById("miModal").style.display = "flex";
};
</script>
</body>
</html>
